{% extends "base.html" %}
{% block content %}
<div class="card p-4 mx-auto" style="max-width:480px">
  <h2>Вхід у систему</h2>
  <form method="post">
    <label class="form-label">Email</label><input class="form-control mb-3" type="email" name="username" required>
    <label class="form-label">Пароль</label><input class="form-control mb-3" type="password" name="password" required>
    <button class="btn btn-primary">Увійти</button>
  </form>
  <p class="text-muted mt-3 small">Тест: patient@example.com / patient123</p>
</div>
{% endblock %}
